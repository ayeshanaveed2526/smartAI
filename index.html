<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Assistant</title>
    <meta name="description" content="Your personal AI assistant powered by Gemini.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="ChatGPT Image Jun 19, 2025, 12_17_47 AM.png">
    
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Marked.js for rendering markdown nicely -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Lucide Icons for sleek UI icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="script.js" defer></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <i data-lucide="sparkles" class="logo-icon"></i>
                <h1>Smart AI</h1>
            </div>
            <p class="subtitle">Your intelligent companion for any question</p>
        </header>

        <main class="chat-container">
            <div id="answer-container" class="answer-container empty">
                <div class="empty-state">
                    <i data-lucide="bot" class="empty-icon"></i>
                    <p>How can I help you today?</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off" autofocus>
                    <button id="mybtn" class="submit-btn" aria-label="Send message">
                        <i data-lucide="send" class="send-icon"></i>
                        <span class="btn-text">Ask</span>
                    </button>
                </div>
                <p class="hint-text">AI can make mistakes. Consider verifying important information.</p>
            </div>
        </main>
    </div>
</body>
</html>
